<!DOCTYPE html>
<html lang="en"></html>

    
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Fashion</title>

<title>Login - Spring Fashion</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(120deg, #ff9a9e, #fad0c4);
    }

    .container {
        width: 350px;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h1 {
        margin-bottom: 10px;
        color: #ff4b5c;
    }

    .brand {
        font-size: 14px;
        color: gray;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
    }

    input:focus {
        border-color: #ff4b5c;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        background: #ff4b5c;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #e63e50;
    }

    .toggle {
        margin-top: 15px;
        font-size: 14px;
    }

    .toggle span {
        color: #ff4b5c;
        cursor: pointer;
        font-weight: bold;
    }

    .hidden {
        display: none;
    }
</style>
</head>


<body style="font-family:sans-serif; text-align:center; margin-top:100px;">
<div class="container">

    <h1>Spring Fashion 🌸</h1>
    <div class="brand">Trendy Clothing Store</div>


<h2>Login</h2>
<form onsubmit="return loginUser()">
  <input type="text" id="username" placeholder="Enter Username" required>
  <input type="password" id="password" placeholder="Enter Password" required>
  <button type="submit">Login</button>
</form>

<p id="message"></p>

<script>

function loginUser() {
    let username = document.getElementById("loginUsername").value.trim();
    let password = document.getElementById("loginPassword").value.trim();

    let user = JSON.parse(localStorage.getItem(username));

    if (!user) {
        alert("User not found ❌");
        return false;
    }

    if (user.password === password) {
        alert("Login Successful ✅");
        window.location.href = "index.html";
    } else {
        alert("Wrong Password ❌");
    }

    return false;
}
</script>

<p>Don't have an account? 
<a href="signup.html">Sign Up</a>
</p>

<script>
function login() {
    alert("Login Successful!");
    window.location.href = "index.html";
}
</script>


<p id="message"></p>

<!-- JS goes here (IMPORTANT) -->
<script src="script.js"></script>



</body>
</html>
