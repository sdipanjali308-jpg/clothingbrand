<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Spring Fashion</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(120deg, #ff9a9e, #fad0c4);
}

.container {
    width: 350px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    margin-bottom: 10px;
    color: #ff4b5c;
}

.brand {
    font-size: 14px;
    color: gray;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
}

input:focus {
    border-color: #ff4b5c;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #ff4b5c;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #e63e50;
}

p {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌸 Spring Fashion</h1>
    <p class="brand">Create your account</p>

    <form onsubmit="return signupUser()">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="phone" placeholder="Mobile Number" required>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>

        <button type="submit">Sign Up</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script>
function signupUser() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let user = {
        name: name,
        email: email,
        phone: phone,
        username: username,
        password: password
    };

    // Save data in browser (localStorage)
    localStorage.setItem(username, JSON.stringify(user));

    alert("Signup Successful!");

    // Redirect to login page
    window.location.href = "login.html";

    return false; // prevent page reload
}
</script>
<script src="script.js"></script>

</body>
</html>
